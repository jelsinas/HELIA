<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil – HELIA INDONESIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f2ede8;
      --dark: #1a1a1a;
      --mid: #555;
      --light-border: #ddd8d2;
      --accent: #c8a882;
      --white: #ffffff;
      --error: #c0392b;
      --success: #5a7a5a;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 48px;
      background: var(--cream);
      border-bottom: 1px solid var(--light-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      text-decoration: none;
      color: var(--dark);
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--dark); }
    .nav-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-icons a {
      color: var(--dark);
      text-decoration: none;
      font-size: 18px;
      display: flex;
      align-items: center;
      position: relative;
    }
    .cart-badge {
      position: absolute;
      top: -6px; right: -8px;
      background: var(--dark);
      color: #fff;
      font-size: 9px;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Jost', sans-serif;
    }

    /* ── CARD ── */
    .card-wrap {
      display: flex;
      justify-content: center;
      padding: 64px 16px;
    }
    .card {
      background: var(--white);
      padding: 48px 52px 52px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 30px rgba(0,0,0,.06);
    }
    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .card-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 4px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 16px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--error);
      color: var(--white);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: 24px;
    }
    .btn-primary:hover { background: #a93226; }
    .btn-primary:active { transform: scale(.99); }

    /* responsive */
    @media(max-width:600px){
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .card { padding: 32px 24px 36px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">HELIA</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-icons">
    <a href="#" title="Cari">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </a>
    <a href="cart.html" title="Keranjang" style="position:relative">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge" id="cartCount">0</span>
    </a>
    <a href="profil.html" title="Akun" id="profileIcon">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </div>
</nav>

<!-- CARD -->
<div class="card-wrap">
  <div class="card">
    <div class="card-header">
      <div class="card-brand">HELIA</div>
      <div class="card-title">Profil Saya</div>
    </div>

    <div style="text-align:center; margin-bottom: 24px;">
      <div style="width: 80px; height: 80px; background: var(--dark); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-family: 'Cormorant Garamond', serif; margin: 0 auto 16px;" id="profileInitials"></div>
      <h3 id="profileName" style="font-size: 18px; margin-bottom: 4px; font-weight: 500;"></h3>
      <p id="profileEmail" style="font-size: 14px; color: var(--mid);"></p>
    </div>

    <button class="btn-primary" onclick="handleLogout()">KELUAR DARI AKUN</button>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // Ensure we display correct user data
  document.addEventListener("DOMContentLoaded", function() {
    const loggedIn = JSON.parse(localStorage.getItem('helia_logged_in') || 'null');
    if (!loggedIn) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('profileName').textContent = loggedIn.name;
      document.getElementById('profileEmail').textContent = loggedIn.email;
      const initials = loggedIn.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      document.getElementById('profileInitials').textContent = initials;
    }
  });

  function handleLogout() {
    localStorage.removeItem('helia_logged_in');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
