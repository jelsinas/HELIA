<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – HELIA INDONESIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f2ede8;
      --dark: #1a1a1a;
      --mid: #555;
      --light-border: #ddd8d2;
      --accent: #c8a882;
      --white: #ffffff;
      --error: #c0392b;
      --success: #5a7a5a;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 48px;
      background: var(--cream);
      border-bottom: 1px solid var(--light-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      text-decoration: none;
      color: var(--dark);
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--dark); }
    .nav-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-icons a {
      color: var(--dark);
      text-decoration: none;
      font-size: 18px;
      display: flex;
      align-items: center;
      position: relative;
    }
    .cart-badge {
      position: absolute;
      top: -6px; right: -8px;
      background: var(--dark);
      color: #fff;
      font-size: 9px;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Jost', sans-serif;
    }

    /* ── TAB SWITCH ── */
    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      margin: 32px auto 0;
      width: fit-content;
      border: 1.5px solid var(--dark);
    }
    .tab-btn {
      padding: 12px 52px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--dark);
      transition: background .2s, color .2s;
      text-decoration: none;
      display: inline-block;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--dark);
      color: var(--white);
    }

    /* ── CARD ── */
    .card-wrap {
      display: flex;
      justify-content: center;
      padding: 32px 16px 64px;
    }
    .card {
      background: var(--white);
      padding: 48px 52px 52px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 30px rgba(0,0,0,.06);
    }
    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .card-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 4px;
    }
    .card-sub {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 4px;
    }
    .card-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--mid);
      margin-top: 4px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 16px;
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 22px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .form-group input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--light-border);
      background: transparent;
      padding: 10px 2px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      color: var(--dark);
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-bottom-color: var(--dark);
    }
    .form-group input::placeholder { color: #bbb; }
    .eye-btn {
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mid);
      font-size: 16px;
      padding: 0;
    }

    .forgot-link {
      display: block;
      font-size: 11px;
      text-align: right;
      color: var(--mid);
      text-decoration: none;
      margin-top: -12px;
      margin-bottom: 28px;
      letter-spacing: .5px;
    }
    .forgot-link:hover { color: var(--dark); text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--dark);
      color: var(--white);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-bottom: 14px;
    }
    .btn-primary:hover { background: #333; }
    .btn-primary:active { transform: scale(.99); }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--dark);
      border: 1.5px solid var(--light-border);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .btn-google:hover { border-color: var(--dark); background: #f9f9f9; }

    .divider {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 1px;
      margin: 0 0 16px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--light-border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .switch-link {
      text-align: center;
      font-size: 12px;
      color: var(--mid);
    }
    .switch-link a {
      color: var(--dark);
      font-weight: 600;
      text-decoration: none;
    }
    .switch-link a:hover { text-decoration: underline; }

    .note-msg {
      font-size: 12px;
      text-align: center;
      margin-top: 16px;
      min-height: 18px;
      color: var(--mid);
    }

    /* checkbox */
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--mid);
      line-height: 1.5;
    }
    .checkbox-row input[type="checkbox"] { margin-top: 2px; accent-color: var(--dark); }

    /* responsive */
    @media(max-width:600px){
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .card { padding: 32px 24px 36px; }
      .tab-btn { padding: 12px 32px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">HELIA</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-icons">
    <a href="#" title="Cari">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </a>
    <a href="cart.html" title="Keranjang" style="position:relative">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge" id="cartCount">0</span>
    </a>
    <a href="login.html" title="Akun" id="profileIcon">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </div>
</nav>

<!-- TAB -->
<div class="tab-bar">
  <a href="login.html" class="tab-btn active">Masuk</a>
  <a href="daftar.html" class="tab-btn">Daftar</a>
</div>

<!-- CARD -->
<div class="card-wrap">
  <div class="card">
    <div class="card-header">
      <div class="card-brand">HELIA</div>
      <div class="card-sub">Helia Indonesia</div>
      <div class="card-tagline">Your Look, Your Way</div>
      <div class="card-title">Login</div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="contoh@email.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
        <button class="eye-btn" id="togglePwd" type="button" title="Tampilkan password">
          <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <a href="#" class="forgot-link">Lupa Password?</a>

    <button class="btn-primary" onclick="handleLogin()">MASUK</button>

    <div class="divider">atau</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.2 0 6 1.1 8.2 3.2l6.1-6.1C34.4 3.2 29.5 1 24 1 14.9 1 7.1 6.5 3.5 14.3l7.1 5.5C12.4 13.4 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z" /><path fill="#FBBC05" d="M10.6 28.7c-.7-2-1.1-4.1-1.1-6.2s.4-4.2 1.1-6.2l-7.1-5.5C1.3 14.5 0 19.1 0 24s1.3 9.5 3.5 13.2l7.1-5.5z"/><path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.8 1.2-4.1 1.9-6.1 1.9-6.3 0-11.6-3.9-13.4-9.3l-7.1 5.5C7.1 41.5 14.9 47 24 47z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Masuk dengan Google
    </button>

    <p class="switch-link">Belum punya akun? <a href="daftar.html">Daftar Sekarang →</a></p>
    <p class="note-msg" id="loginNote"></p>
  </div>
</div>

<script>
  // Toggle password visibility
  const togglePwd = document.getElementById('togglePwd');
  const loginPassword = document.getElementById('loginPassword');
  togglePwd.addEventListener('click', () => {
    const isText = loginPassword.type === 'text';
    loginPassword.type = isText ? 'password' : 'text';
    document.getElementById('eyeIcon').innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  });

  function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    const note = document.getElementById('loginNote');

    if (!email || !pass) {
      note.textContent = 'Email dan password wajib diisi.';
      note.style.color = 'var(--error)';
      return;
    }
    if (!email.includes('@')) {
      note.textContent = 'Format email tidak valid.';
      note.style.color = 'var(--error)';
      return;
    }

    // Cek dari localStorage (akun yang sudah daftar)
    const users = JSON.parse(localStorage.getItem('helia_users') || '[]');
    const found = users.find(u => u.email === email && u.password === pass);

    if (found) {
      localStorage.setItem('helia_logged_in', JSON.stringify({ name: found.name, email: found.email }));
      note.textContent = '✓ Berhasil masuk! Mengalihkan...';
      note.style.color = 'var(--success)';
      setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    } else {
      note.textContent = 'Email atau password salah. Belum punya akun? Daftar dulu.';
      note.style.color = 'var(--error)';
    }
  }

  function handleGoogle() {
    localStorage.setItem('helia_logged_in', JSON.stringify({ name: 'Pengguna Google', email: 'user@gmail.com' }));
    const note = document.getElementById('loginNote');
    note.textContent = '✓ Berhasil masuk dengan Google! Mengalihkan...';
    note.style.color = 'var(--success)';
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
  }

  // Enter key submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  </script>
  <script src="auth.js"></script>
</body>
</html>
